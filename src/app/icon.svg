<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- 深海军底 -->
  <rect width="32" height="32" rx="4" fill="#0d2742"/>
  <!-- 朝阳：贴近地平线 -->
  <circle cx="16" cy="13" r="3" fill="#c8923a"/>
  <!-- 海平线 -->
  <line x1="5" y1="20" x2="27" y2="20" stroke="#f0deb4" stroke-width="1.4" stroke-linecap="round"/>
  <!-- 水波（右偏） -->
  <line x1="11" y1="24" x2="24" y2="24" stroke="#f0deb4" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
</svg>
