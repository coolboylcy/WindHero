<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- 深海军底，呼应整站 ink 主色 -->
  <rect width="32" height="32" rx="4" fill="#0d2742"/>
  <!-- 朝阳：sun-gold 圆点 -->
  <circle cx="16" cy="13" r="2.6" fill="#c8923a"/>
  <!-- 地平线：主线（海平面） -->
  <line x1="5" y1="19" x2="27" y2="19" stroke="#f0deb4" stroke-width="1.2" stroke-linecap="round"/>
  <!-- 海面波纹：副线（虚淡） -->
  <line x1="9" y1="22.5" x2="23" y2="22.5" stroke="#f0deb4" stroke-width="0.8" stroke-linecap="round" opacity="0.45"/>
</svg>
